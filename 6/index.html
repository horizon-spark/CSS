<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кастомный Bootstrap</title>
    <link rel="stylesheet" href="assets/css/bootstrap-custom.css" />
  </head>
  <body>
    <div class="container mt-5">
      <nav class="navbar navbar-light bg-light">
        <h1>Мой кастомный Bootstrap</h1>
        <button class="btn btn-primary">Primary кнопка</button>
        <button class="btn btn-secondary">Secondary кнопка</button>
      </nav>

      <br />

      <nav>
        <button class="btn btn-brand-primary">Brand-primary кнопка</button>
        <button class="btn btn-brand-accent">Brand-accent кнопка</button>
        <button class="btn btn-brand-soft">Brand-soft кнопка</button>
      </nav>

      <div class="card mt-3" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title">Тестовая карточка</h5>
          <p class="card-text">Проверяем, работает ли кастомизация.</p>
        </div>
      </div>

      <br />

      <div class="custom-card" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title">Карточка с тенью и градиентом</h5>
          <p class="card-text">Проверяем, работает ли кастомизация.</p>
        </div>
      </div>

      <br />

      <button class="custom-button">Нестандартная кнопка</button>

      <br /><br />

      <h1 class="custom-header">Адаптивный заголовок</h1>
    </div>

    <section style="text-align: center">
      <h2 style="margin-bottom: 2rem">Демонстрация тултипов</h2>
      <button
        type="button"
        class="btn btn-primary me-2"
        data-bs-toggle="tooltip"
        data-bs-placement="left"
        title="Тултип слева"
      >
        Слева
      </button>
      <button
        type="button"
        class="btn btn-primary me-2"
        data-bs-toggle="tooltip"
        data-bs-placement="top"
        title="Тултип сверху"
      >
        Сверху
      </button>
      <button
        type="button"
        class="btn btn-primary me-2"
        data-bs-toggle="tooltip"
        data-bs-placement="bottom"
        title="Тултип снизу"
      >
        Снизу
      </button>
      <button
        type="button"
        class="btn btn-primary me-2"
        data-bs-toggle="tooltip"
        data-bs-placement="right"
        title="Тултип справа"
      >
        Справа
      </button>
    </section>

    <section style="text-align: center">
      <h2 style="margin: 2rem 0rem 5rem 0rem">Демонстрация поповеров</h2>
      <button
        type="button"
        class="btn btn-success me-2"
        data-bs-toggle="popover"
        data-bs-container="body"
        data-bs-placement="top"
        data-bs-title="Заголовок"
        data-bs-content="Основной контент поповера"
      >
        Поповер сверху
      </button>
      <br />
      <button
        type="button"
        class="btn btn-success me-2"
        data-bs-toggle="popover"
        data-bs-container="body"
        data-bs-placement="left"
        data-bs-title="Заголовок"
        data-bs-content="Основной контент поповера"
      >
        Поповер слева
      </button>
      <button
        type="button"
        class="btn btn-success me-2"
        data-bs-toggle="popover"
        data-bs-container="body"
        data-bs-placement="right"
        data-bs-title="Заголовок"
        data-bs-content="Основной контент поповера"
      >
        Поповер справа
      </button>
      <br />
      <button
        type="button"
        class="btn btn-success me-2"
        data-bs-toggle="popover"
        data-bs-container="body"
        data-bs-placement="bottom"
        data-bs-title="Заголовок"
        data-bs-content="Основной контент поповера"
      >
        Поповер снизу
      </button>
      <br /><br /><br /><br />
    </section>

    <button
      type="button"
      class="btn btn-info"
      data-bs-toggle="popover"
      data-bs-container="body"
      data-bs-placement="right"
      data-bs-html="true"
      data-bs-title="Характеристики"
      data-bs-content='<ul><li>Процессор: Intel Core i7</li><li>Память: 16GB</li><li>Экран: 15.6"</li></ul><button class="btn btn-sm btn-primary mt-2">Купить</button>'
    >
      Подробнее о товаре
    </button>

    <br /><br />

    <button id="delayPopover">Задержка</button>

    <br /><br /><br /><br />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      // Инициализация тултипов
      const tooltipTriggerList = document.querySelectorAll(
        '[data-bs-toggle="tooltip"]',
      );
      const tooltipList = [...tooltipTriggerList].map(
        (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl),
      );

      // Инициализация поповеров
      const popoverTriggerList = document.querySelectorAll(
        '[data-bs-toggle="popover"]',
      );
      const popoverList = [...popoverTriggerList].map(
        (popoverTriggerEl) => new bootstrap.Popover(popoverTriggerEl),
      );

      const delayButton = document.getElementById("delayPopover");
      if (delayButton) {
        new bootstrap.Popover(delayButton, {
          placement: "bottom",
          trigger: "hover",
          delay: { show: 500, hide: 200 },
          title: "Задержка",
          content: "Я появился через 0.5 секунды!",
        });
      }
    </script>
  </body>
</html>
