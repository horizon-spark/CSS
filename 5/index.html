<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кастомный Bootstrap</title>
    <link rel="stylesheet" href="dist/bootstrap-custom.css" />
  </head>
  <body>
    <div class="container mt-5">
      <nav class="navbar navbar-light bg-light">
        <h1>Мой кастомный Bootstrap</h1>
        <button class="btn btn-primary">Primary кнопка</button>
        <button class="btn btn-secondary">Secondary кнопка</button>
      </nav>

      <br />

      <nav>
        <button class="btn btn-brand-primary">Brand-primary кнопка</button>
        <button class="btn btn-brand-accent">Brand-accent кнопка</button>
        <button class="btn btn-brand-soft">Brand-soft кнопка</button>
      </nav>

      <div class="card mt-3" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title">Тестовая карточка</h5>
          <p class="card-text">Проверяем, работает ли кастомизация.</p>
        </div>
      </div>

      <br />

      <div class="custom-card" style="width: 18rem">
        <div class="card-body">
          <h5 class="card-title">Карточка с тенью и градиентом</h5>
          <p class="card-text">Проверяем, работает ли кастомизация.</p>
        </div>
      </div>

      <br />

      <button class="custom-button">Нестандартная кнопка</button>

      <br /><br />

      <h1 class="custom-header">Адаптивный заголовок</h1>
    </div>
  </body>
</html>
